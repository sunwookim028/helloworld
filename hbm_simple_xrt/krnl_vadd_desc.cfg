# Kernel connectivity configuration for descriptor-based DMA
# Maps kernel memory interfaces to specific HBM banks

[connectivity]
# Descriptor buffer in HBM[0]
sp=krnl_vadd_desc_1.desc_mem:HBM[0]

# Unified data memory in HBM[1:3] (multi-bank access for bandwidth)
sp=krnl_vadd_desc_1.data_mem:HBM[1:3]
